<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonTech | Accesorios Premium</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="../index.html" class="back-btn"><i class='bx bx-arrow-back'></i> Volver a la Agencia</a>
            <div class="logo">Neon<span>Tech</span></div>
        </div>
        
        <div class="nav-categories">
            <button class="cat-btn active" data-cat="todos">Todos</button>
            <button class="cat-btn" data-cat="teclados">Teclados</button>
            <button class="cat-btn" data-cat="auriculares">Auriculares</button>
            <button class="cat-btn" data-cat="ratones">Mouse</button>
            <button class="cat-btn" data-cat="mousepads">Mousepads</button>
        </div>

        <div class="nav-right">
            <div class="cart-icon" id="cart-btn">
                <i class='bx bx-cart-alt'></i>
                <span class="cart-count pulse" id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content fade-in">
            <h1>Eleva tu <span>Setup</span></h1>
            <p>Periféricos de alto rendimiento para profesionales y gamers exigentes.</p>
        </div>
    </header>

    <main class="container">
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <div class="cart-overlay" id="cart-overlay"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Tu Carrito</h2>
            <button id="close-cart"><i class='bx bx-x'></i></button>
        </div>
        <div class="cart-items" id="cart-items">
            </div>
        <div class="cart-footer">
            <div class="totals">
                <div class="total-row">
                    <span>Total (USD)</span>
                    <span id="total-usd">U$D 0.00</span>
                </div>
                <div class="total-row highlight">
                    <span>Total (ARS)</span>
                    <span id="total-ars">$ 0</span>
                </div>
            </div>
            <button class="checkout-btn">Finalizar Compra</button>
        </div>
    </aside>

    <script src="script.js"></script>
</body>
</html>
